<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

 <div class="weather-container">
    <div class="weather-header">
      <form class="weather-search">
        <input type="text" name="search" id="search" placeholder="Search for a city..." class="weather-searchform">
        <i class="fa-solid fa-magnifying-glass"></i>
      </form>

      <div class="weather-units">
        <span class="weather-unit-celsius">&#176C</span>
        <span class="weather-unit-farenheit">&#176F</span>
      </div>
    </div>

    <div class="weather-body">
      <div class="weather-datetime">
        <h1 class="weather-city"></h1>
        <p class="datetime"></p>
      </div>

      <div class="weather-forecast">
        <p class="forecast"></p>
        <div class="weather-icon">
          
        </div>
      </div>

      <div class="weather-temp-range">
        <p class="weather-temperature"></p>
        <div class="weather-minmax">
          <p></p>
          <p></p>
        </div>
      </div>
    </div>

    <div class="weather-info">
      <div class="weather-info-container">
        <div class="weather-card">
          <i class="fa-solid fa-temperature-full"></i>
          <div>
            <p>Real Feel</p>
            <p class="weather-realfeel">18&#176</p>
          </div>
        </div>

        <div class="weather-card">
          <i class="fa-solid fa-droplet"></i>
          <div>
            <p>Humidity</p>
            <p class="weather-humidity"></p>
          </div>
        </div>

      </div>

        <div class="weather-info-container">
          <div class="weather-card">
            <i class="fa-solid fa-wind"></i>
            <div>
              <p>Wind</p>
              <p class="weather-wind"></p>
            </div>
          </div>

          <div class="weather-card">
            <i class="fa-solid fa-gauge-high"></i>
            <div>
              <p>Pressure</p>
              <p class="weather-pressure"></p>
            </div>
          </div>
        </div>
    </div>
 </div>


  <script src="./index.js"></script>
</body>
</html>
